<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 320px;
    background: #0e0e0e;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .header span { font-size: 20px; }
  .header h1 { font-size: 16px; font-weight: 800; }
  .header h1 em { font-style: normal; color: #a1a1aa; font-weight: 600; }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #27272a;
    border-radius: 8px;
    color: #e5e5e5;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    font-family: monospace;
  }
  input:focus { border-color: #3f3f46; }
  button {
    width: 100%;
    background: #ef4444;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 11px;
    cursor: pointer;
  }
  button:hover { background: #f87171; }
  .status {
    margin-top: 12px;
    font-size: 12px;
    text-align: center;
  }
  .status.saved { color: #22c55e; }
  .status.empty { color: #71717a; }
  .info {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #27272a;
    font-size: 11px;
    color: #52525b;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="header">
    <span>🇪🇸</span>
    <h1>Carlos <em>Console</em></h1>
  </div>

  <div class="field">
    <label>Claude API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
  </div>

  <button id="saveBtn">Save Key</button>
  <div class="status" id="status"></div>

  <div class="info">
    Go to any tweet on X — you'll see a <b>🇪🇸 Carlos</b> button and a <b>@grok</b> button on each tweet. Carlos auto-generates and fills the reply. @grok auto-fills and sends.
  </div>

  <script src="popup.js"></script>
</body>
</html>
